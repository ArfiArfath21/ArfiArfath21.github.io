<!DOCTYPE html>
<html>

<head>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>

<body>
    <div class="brandImg container">
        <div class="row">
            <div class="col"></div>
            <div class="col-3">
                <img id="brandImage" class="img-fluid" src="files/PS_Logo_CMYK_White-ai.png" alt="Publicis Sapient">
            </div>
            <div class="col"></div>
        </div>
    </div>
    <div class="campaignTitle text-center">
        <h1>SPIN THE WHEEL</h1>
        <h3>and stand a chance to <span style="color: #d93550;">win exciting prizes!!!</span></h3>
    </div>
    <div class="trigger text-center">
        <button class="btn btn-primary" id="toggleButton">SPIN THE WHEEL</button>
    </div>
    <div class="wheel-container">
        <div class="row">
            <div class="col"></div>
            <div class="centered-wheel col-8">
                <img id="spinFrame" class="img-fluid imgframe" src="files/STW-Frame-4-2.png" alt="Spinning Frame">
                <!-- <img id="spinFrame" class="img-fluid imgframe" src="files/PS_Aperture_RGB-ai-drop.png" alt="Spinning Frame"> -->
                <img id="spinImage" class="img-fluid" src="files/AI-2.png" alt="Spinning Image">
            </div>
            <div class="col"></div>
        </div>
    </div>

    <div class="modal" id="exampleModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Sign Up & Get a chance to win Prizes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="qrcode"></div>
                </div>
                <div class="modal-footer">
                    <div id="categorySelected"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- <div class="qr-container">
        <div class="row">
            <div class="col"></div>
            <div class="col-2">
                <div id="qrcode"></div>
            </div>
            <div class="col"></div>
        </div>
    </div> -->
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- <script src="files/bootstrap.bundle.min.js"></script> -->
</body>

</html>
